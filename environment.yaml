name: iskra
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python==3.12
  - pytorch==2.7.0
  - torchvision
  - pytorch-cuda=12.4
  - cuda-nvcc=12.4
  - cuda-runtime=12.4
  - cuda-libraries-dev=12.4
  - libcublas-dev=12.4  
  - cupy
  - cudnn
  - cutensor 
  - nccl
  - conda-forge::ffmpeg
  - pip
  - pip:
    # Core libraries
    - numpy
    - scipy
    - networkx
    - cholespy
    # Mesh IO
    - trimesh
    - meshio
    - libigl
    - fsspec[http]
    # Helpers
    - rich
    - typing-extensions