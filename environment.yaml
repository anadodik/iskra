name: iskra
channels:
  - nvidia
  - conda-forge
dependencies:
  - python==3.12
  # - nvidia/label/cuda-12.5.1::cuda-version
  # - nvidia::cuda
  # - nvidia::cuda-toolkit
  # - nvidia::cuda-tools
  # - nvidia::cuda-nvcc-tools
  # - nvidia::cuda-cudart-dev
  # - nvidia::cuda-cudart-static
  # - nvidia::cuda-runtime
  # - nvidia::cuda-nvcc
  # - nvidia::cuda-libraries-dev
  # - nvidia::cuda-libraries-static
  # - nvidia::libcublas-dev
  # - nvidia::cudnn
  # - nvidia::cutensor
  # - conda-forge::cupy-core
  - conda-forge::ffmpeg
  - conda-forge::libxcrypt # nanobind fails to compile without this
  - pip
  - pip:
      # Core libraries
      - torch==2.9
      - nvmath-python[cu12-dx]
      - cuda-toolkit[nvcc,nvrtc]==12.8.*
      - --extra-index-url https://download.pytorch.org/whl/cu128
      - numpy
      - scipy
      - networkx
      - cholespy
      # Mesh IO
      - trimesh
      - meshio
      - libigl
      - fsspec[http]
      - requests
      # Helpers
      - rich
      - typing-extensions

