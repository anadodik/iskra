name: iskra
channels:
  - conda-forge
dependencies:
  - ninja
  - pip
  - pip:
      # Linters:
      - ruff
      - basedpyright
      - nvtx
      # Visualization
      - matplotlib
      - jupyterlab
      - ipywidgets
      - widgetsnbextension
      - ipympl
      # Testing:
      - pytest
      - pytest-cases
      - pytest-cov
      # Documentation
      - mkdocs
      - mkdocs-material
      - mkdocstrings
      - mkdocstrings-python
      - mkdocs-autorefs
      - griffe_typingdoc
      # Deployment
      - nanobind>=2.5.0
      - scikit-build-core>=0.10.7
      - pyproject-metadata
      - setuptools
      - twine>=1.11.0
      - wheel
      - packaging
