name: Unit Tests

on:
  push:    
    branches:
      - main      
  workflow_dispatch:
  pull_request:
    branches:
      - main
    

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    name: Run Tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}   

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: iskra
          environment-file: environment.yaml
          auto-activate-base: false

      - name: Update development environment
        shell: bash -l {0}
        run: |
          conda env update -f environment-dev.yaml
          conda run -n iskra pip install -e .

      - name: Verify Conda Environment
        run: |
              conda info
              conda list
              python --version 

      - name: Run tests
        shell: bash -l {0}
        run: |          
          conda run -n iskra pytest test/
